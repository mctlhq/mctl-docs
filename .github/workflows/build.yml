name: build

on:
  push:
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mctlhq/mctl-docs
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update mctl-gitops image tag
        if: github.ref_type == 'tag'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/${{ vars.GITOPS_REPO || 'mctlhq/mctl-gitops' }}.git /tmp/mctl-gitops
          cd /tmp/mctl-gitops
          python3 - <<'PYEOF'
          import re, os
          f = 'platform-gitops/services/admins/mctl-docs/values.yaml'
          version = os.environ['VERSION']
          content = open(f).read()
          content = re.sub(
              r'(repository: ghcr\.io/mctlhq/mctl-docs\n\s+tag:)[^\n]+',
              r'\1 "' + version + '"',
              content
          )
          open(f, 'w').write(content)
          PYEOF
          git config user.email "ci@mctl.ai"
          git config user.name "mctl-ci"
          git add platform-gitops/services/admins/mctl-docs/values.yaml
          git diff --staged --quiet || git commit -m "chore: bump mctl-docs to ${VERSION}"
          git push
